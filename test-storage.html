<!DOCTYPE html>
<html>
<head>
    <title>测试本地存储</title>
</head>
<body>
    <h1>测试本地存储</h1>
    <button onclick="checkStorage()">检查本地存储</button>
    <button onclick="setTestGender()">设置测试性别</button>
    <div id="result"></div>

    <script>
        function checkStorage() {
            const result = document.getElementById('result');
            try {
                const userInfo = localStorage.getItem('userInfo');
                result.innerHTML = '<h2>本地存储内容：</h2>';
                if (userInfo) {
                    const parsedUserInfo = JSON.parse(userInfo);
                    result.innerHTML += '<pre>' + JSON.stringify(parsedUserInfo, null, 2) + '</pre>';
                    result.innerHTML += '<p>性别：' + (parsedUserInfo.gender || '未设置') + '</p>';
                } else {
                    result.innerHTML += '<p>本地存储中没有userInfo</p>';
                }
            } catch (error) {
                result.innerHTML += '<p>错误：' + error.message + '</p>';
            }
        }

        function setTestGender() {
            const result = document.getElementById('result');
            try {
                const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
                userInfo.gender = 'female'; // 设置为女性作为测试
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
                result.innerHTML = '<h2>测试性别已设置</h2>';
                result.innerHTML += '<p>性别已设置为：female</p>';
            } catch (error) {
                result.innerHTML += '<p>错误：' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
